<!doctype html>
<html lang="hy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Avetisyan Beauty Clinic</title>
    <meta name="description" content="Avetisyan Beauty Clinic — Ultraformer III, Golden Sun, SMAS lifting. Ереван, ул. Амиряна 18." />
    <meta name="theme-color" content="#C89B4E" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to font origin (saves ~100-300ms on first font request) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Non-render-blocking Google Fonts.
      - preload: tells browser to fetch the stylesheet early, in parallel
      - onload swaps rel to 'stylesheet' once downloaded, applying fonts
        without blocking first paint
      - noscript fallback for users with JS disabled
      - Reduced to 2 weights per family (400 for body, 600 for headings) —
        was loading 11 weights before. Each weight = ~50 KB WOFF2.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;600&display=swap"
      />
    </noscript>

    <!--
      Critical CSS — sets background + text colour before main bundle loads
      so the page doesn't flash white on dark theme.
    -->
    <style>
      html, body { background: #080808; color: #F5F5F5; margin: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Inline skeleton shown until React hydrates. Improves perceived speed. -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#080808;">
        <div style="width:48px;height:48px;border:2px solid rgba(200,155,78,0.2);border-top-color:#C89B4E;border-radius:50%;animation:av-spin 0.9s linear infinite;"></div>
      </div>
      <style>
        @keyframes av-spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
